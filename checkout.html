<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuSitioPronto | Checkout</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="color: white; background: #111;">

    <div class="container" style="max-width: 600px; margin: 50px auto; padding: 20px; background: #222; border-radius: 8px;">
        <h2><i class="fas fa-credit-card"></i> Checkout - Proceso de Pago</h2>
        <p>Completa la contratación de tu plan digital de forma segura.</p>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <form onsubmit="finalizarCompra(event)">
            <h3>1. Datos de Contacto</h3>
            <label>Nombre Completo:</label>
            <input type="text" required style="width: 100%; padding: 8px; margin: 8px 0; background: #333; color: white; border: none; border-radius: 4px;">
            
            <label>Correo Electrónico:</label>
            <input type="email" required style="width: 100%; padding: 8px; margin: 8px 0; background: #333; color: white; border: none; border-radius: 4px;">

            <br><br>
            <h3>2. Información de Pago (Simulación)</h3>
            <label>Número de Tarjeta:</label>
            <input type="text" placeholder="4152 •••• •••• ••••" required style="width: 100%; padding: 8px; margin: 8px 0; background: #333; color: white; border: none; border-radius: 4px;">
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Expiración:</label>
                    <input type="text" placeholder="MM/AA" required style="width: 100%; padding: 8px; margin: 8px 0; background: #333; color: white; border: none; border-radius: 4px;">
                </div>
                <div style="flex: 1;">
                    <label>CVV:</label>
                    <input type="text" placeholder="123" required style="width: 100%; padding: 8px; margin: 8px 0; background: #333; color: white; border: none; border-radius: 4px;">
                </div>
            </div>

            <br>
            <button type="submit" style="background: #00ffcc; color: black; font-weight: bold; width: 100%; padding: 12px; border: none; cursor: pointer; border-radius: 5px; font-size: 1.1rem; margin-top: 10px;">
                Pagar y Activar Suscripción
            </button>
        </form>
    </div>

    <script type="module" src="js/main.js"></script>

    <script>
        function finalizarCompra(e) {
            e.preventDefault();

            // 1. Limpiamos el carrito
            localStorage.removeItem('carrito');

            // 2. Ejecutamos tu notificación profesional
            window.mostrarToastNotificacion("¡Pago procesado con éxito! Tu plan se está configurando.");

            // 3. Esperamos 2 segundos para que se vea el mensaje y redirigimos
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
        }
    </script>
</body>
</html>
