<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuSitioPronto | Carrito de Compras</title>
    <!-- Corregidas las rutas relativas para heredar los estilos globales -->
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cart-section {
            padding: 160px 0 80px 0;
            min-height: 75vh;
        }
        .cart-wrapper {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .cart-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 0;
            transition: background 0.3s ease;
        }
        .cart-item:hover {
            background: rgba(255, 255, 255, 0.01);
        }
        .cart-item-info h3 {
            font-size: 1.3rem;
            color: #0055ff;
            margin-bottom: 5px;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .cart-qty {
            font-size: 0.95rem;
            color: #8b949e;
        }
        .cart-price {
            color: #39ff14;
            font-weight: 600;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.1);
        }
        .btn-delete {
            background: none;
            border: none;
            color: #ff3e3e;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .btn-delete:hover {
            transform: scale(1.2);
            color: #ff6b6b;
        }
        .cart-summary-box {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }
        .btn-checkout {
            background: #ff3e3e;
            color: white;
            border: none;
            padding: 15px 35px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 62, 62, 0.2);
        }
        .btn-checkout:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
        }
        .link-back {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .link-back:hover {
            color: #0055ff;
        }

        @media (max-width: 768px) {
            .cart-section { padding: 140px 20px 60px 20px; }
            .cart-wrapper { padding: 20px; }
            .cart-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .cart-item-actions { width: 100%; justify-content: space-between; gap: 10px; }
            .cart-summary-box { align-items: center; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container flex-nav">
            <div class="logo">
                <i class="fas fa-rocket"></i> TuSitio<span class="text-neon">Pronto</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="paquetes.html">Soluciones</a></li> 
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>

            <div class="nav-extra" style="display: flex; align-items: center; margin-right: 15px;">
                <div class="cart-icon" style="margin-right: 20px; color: #39ff14; cursor: pointer; position: relative;">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="badge-contador" style="position: absolute; top: -8px; right: -10px; background: #ff3e3e; color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 50%;">0</span>
                </div>
                <div class="search-container" style="display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2px 10px;">
                    <input type="text" placeholder="Buscar..." id="search-input" style="background: transparent; border: none; color: white; outline: none; width: 100px; font-size: 0.8rem;">
                    <button style="background: transparent; border: none; color: #8b949e; cursor: pointer;"><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="nav-actions">
                <a href="login.html" class="btn-login">Iniciar Sesión</a>
                <a href="contacto.html" class="btn-primary">Empezar</a>
            </div>
        </div>
    </header>

    <main class="cart-section">
        <div class="container">
            <div class="cart-wrapper">
                <h2 class="cart-title"><i class="fas fa-shopping-cart" style="color: #0055ff;"></i> Tu Carrito de Compras</h2>
                
                <div id="contenido-carrito"></div>
                
                <div class="cart-summary-box">
                    <div id="total-carrito" style="font-size: 1.6rem; font-weight: 700; font-family: 'Playfair Display', serif;"></div>
                    <div style="display: flex; align-items: center; gap: 25px; width: 100%; justify-content: flex-end; flex-wrap: wrap;">
                        <a href="paquetes.html" class="link-back"><i class="fas fa-arrow-left"></i> Seguir Comprando</a>
                        <button id="btn-proceder" class="btn-checkout" onclick="irAlCheckout()">Proceder al Pago</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer style="padding: 40px 5%; background: #0a0a0a; border-top: 1px solid #222; color: #8b949e; font-size: 0.9rem;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; max-width: 1400px; margin: 0 auto;">
            <div>
                <p style="color: white; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem;">TuSitioPronto</p>
                <p style="color: #39ff14; font-weight: 600;">TECNOLOGÍA GLOBAL A TU ALCANCE</p>
            </div>

            <div style="text-align: right;">
                <p style="margin-bottom: 10px;">© 2026 TuSitioPronto S.A. de C.V.</p>
                <div style="margin-bottom: 10px;">
                    <a href="privacidad.html" style="color: #8b949e; text-decoration: none; margin-right: 15px;">Privacidad</a>
                    <a href="terminos.html" style="color: #8b949e; text-decoration: none;">Términos</a>
                </div>
                <div style="font-size: 1.2rem;">
                    <a href="#" style="color: #8b949e; margin-right: 15px; text-decoration: none;"><i class="fab fa-facebook"></i></a>
                    <a href="#" style="color: #8b949e; text-decoration: none;"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Catálogo de auxilio local para evitar bajo cualquier condición el error de campos indefinidos
        const catalogoServiciosMaestro = [
            { id: 1, nombre: "Landing Page", precio: 499, descripcion: "Diseño enfocado en conversión" },
            { id: 2, nombre: "Web Corporativa", precio: 3500, descripcion: "Sitio oficial para tu identidad" },
            { id: 3, nombre: "Tienda Básica", precio: 6000, descripcion: "E-commerce listo para vender" }
        ];

        let cart = JSON.parse(localStorage.getItem('carrito')) || [];
        const contenedor = document.getElementById('contenido-carrito');
        const contenedorTotal = document.getElementById('total-carrito');
        const badgeContador = document.getElementById('badge-contador');

        function actualizarContadorBadge() {
            let totalItems = cart.reduce((acc, item) => acc + item.cantidad, 0);
            if(badgeContador) badgeContador.innerText = totalItems;
        }

        function renderizarCarrito() {
            actualizarContadorBadge();

            if (cart.length === 0) {
                contenedor.innerHTML = `
                    <div style="text-align: center; padding: 40px 0;">
                        <i class="fas fa-folder-open" style="font-size: 3rem; color: #30363d; margin-bottom: 15px;"></i>
                        <p style="color: #8b949e; font-size: 1.1rem;">Tu carrito está vacío actualmente.</p>
                    </div>`;
                contenedorTotal.innerHTML = "";
                document.getElementById('btn-proceder').style.display = "none";
                return;
            }

            contenedor.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                // Validación de Blindaje anti-undefined
                let infoSegura = catalogoServiciosMaestro.find(s => s.id === item.id) || item;
                const nombreFinal = item.nombre || infoSegura.nombre || "Servicio Adquirido";
                const precioFinal = parseFloat(item.precio || infoSegura.precio || 0);
                const descFinal = item.descripcion || infoSegura.descripcion || 'Servicio digital especializado asignado.';

                total += precioFinal * item.cantidad;
                
                contenedor.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h3>${nombreFinal}</h3>
                            <p style="font-size: 0.9rem; color: #8b949e;">${descFinal}</p>
                        </div>
                        <div class="cart-item-actions">
                            <span class="cart-qty">Cantidad: ${item.cantidad}</span>
                            <span class="cart-price">$${(precioFinal * item.cantidad).toLocaleString()} MXN</span>
                            <button onclick="eliminarItem(${index})" class="btn-delete" title="Eliminar ítem"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            contenedorTotal.innerHTML = `Total Estimado: <span style="color: #ffffff;">$${total.toLocaleString()} MXN</span>`;
            document.getElementById('btn-proceder').style.display = "inline-block";
        }

        function eliminarItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(cart));
            renderizarCarrito();
        }

        function irAlCheckout() {
            window.location.href = "checkout.html";
        }

        renderizarCarrito();
    </script>

<script type="module" src="../js/main.js"></script>

</body>
</html>
